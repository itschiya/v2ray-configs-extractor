<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد کانفیگ‌های V2Ray</title>
    <!-- لود کردن فونت زیبای وزیرمتن به عنوان جایگزین استاندارد -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v3.3.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 27, 45, 0.7);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-primary: #00f0ff; /* سایبرپانک آبی */
            --accent-secondary: #ff003c; /* سایبرپانک قرمز */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Yekan Bakh', 'Vazirmatn', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 240, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 0, 60, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* هدر سایت */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--card-border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent-primary), #b070ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .title-section p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* دکمه سابسکریپشن */
        .sub-btn {
            background: rgba(0, 240, 255, 0.1);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .sub-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
            transform: translateY(-2px);
        }

        /* شبکه کارت‌ها */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* کارت کانفیگ */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.2rem;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .badge.vless { background: rgba(0, 240, 255, 0.15); color: var(--accent-primary); }
        .badge.vmess { background: rgba(176, 112, 255, 0.15); color: #b070ff; }
        .badge.trojan { background: rgba(255, 0, 60, 0.15); color: var(--accent-secondary); }

        .flag-icon {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            direction: ltr;
            text-align: right;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .ping {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.9rem;
            font-family: monospace;
            color: var(--success);
        }

        .ping-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .copy-btn:hover {
            color: var(--text-main);
        }

        /* توست (پیغام کپی) */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent-primary);
            color: var(--bg-color);
            padding: 1rem 2rem;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.3);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* لودینگ */
        .loader {
            text-align: center;
            padding: 3rem;
            color: var(--accent-primary);
            font-size: 1.5rem;
            grid-column: 1 / -1;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px dashed var(--card-border);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="title-section">
                <h1>رادار کانفیگ <span>V2Ray</span></h1>
                <p>لیست بروزترین کانفیگ‌های استخراج شده با پینگ‌های بهینه‌سازی شده</p>
            </div>
            <button class="sub-btn" onclick="copySubscription()">
                <i class="fa-solid fa-link"></i>
                کپی لینک سابسکریپشن شخصی
            </button>
        </header>

        <main class="grid" id="configs-grid">
            <div class="loader"><i class="fa-solid fa-circle-notch fa-spin"></i> در حال دریافت کانفیگ‌ها...</div>
        </main>
    </div>

    <div id="toast"><i class="fa-solid fa-check"></i> کپی شد!</div>

    <script>
        // دیکشنری پرچم‌ها بر اساس نام کشورها در کانفیگ
        const flags = {
            'ir': '🇮🇷', 'iran': '🇮🇷', 'tehran': '🇮🇷',
            'de': '🇩🇪', 'germany': '🇩🇪',
            'us': '🇺🇸', 'america': '🇺🇸', 'united states': '🇺🇸',
            'uk': '🇬🇧', 'england': '🇬🇧', 'gb': '🇬🇧',
            'nl': '🇳🇱', 'netherland': '🇳🇱',
            'tr': '🇹🇷', 'turkey': '🇹🇷',
            'fr': '🇫🇷', 'france': '🇫🇷',
            'ca': '🇨🇦', 'canada': '🇨🇦',
            'fi': '🇫🇮', 'finland': '🇫🇮',
            'ru': '🇷🇺', 'russia': '🇷🇺'
        };

        // دیتای تستی در صورت عدم دسترسی به فایل configs.txt (برای پیش‌نمایش لوکال)
        const fallbackData = [
            "vless://1a2b3c4d@192.168.1.1:443?encryption=none&security=tls&type=tcp#Germany-Premium-01",
            "vmess://ew0KICAidiI6ICIyIiwNCiAgInBzIjogIk5ldGhlcmxhbmRzLUZhc3QiLA0KICAiYWRkIjogIjE5Mi4xNjguMS4yIiwNCiAgInBvcnQiOiAiNDQzIg0KfQ==",
            "trojan://myPassword@192.168.1.3:443?security=tls#US-Gaming-Server",
            "vless://987654321@192.168.1.4:80?encryption=none&security=none#Turkey-Relay"
        ];

        let allConfigsRaw = "";

        // تابع تشخیص پرچم از روی اسم کانفیگ
        function getFlag(remark) {
            const lowerRemark = remark.toLowerCase();
            for (const [key, flag] of Object.entries(flags)) {
                if (lowerRemark.includes(key)) {
                    return flag;
                }
            }
            return '🌍'; // پرچم پیش‌فرض
        }

        // استخراج نام کانفیگ
        function extractRemark(url, protocol) {
            try {
                if(protocol === 'vmess') {
                    // دیکد کردن vmess بیس 64
                    const base64Data = url.replace('vmess://', '');
                    const decoded = JSON.parse(atob(base64Data));
                    return decoded.ps || 'VMess Server';
                } else {
                    // برای vless و trojan
                    const decodedUrl = decodeURIComponent(url);
                    const match = decodedUrl.match(/#(.+)$/);
                    return match ? match[1] : 'سرور ناشناس';
                }
            } catch (e) {
                return 'سرور ناشناس';
            }
        }

        // تولید عدد پینگ تصادفی (صرفاً برای زیبایی بصری تا زمان راه‌اندازی بک‌اند)
        function getRandomPing() {
            return Math.floor(Math.random() * (250 - 40 + 1)) + 40;
        }

        // رندر کردن کارت‌ها
        function renderConfigs(configsText) {
            const grid = document.getElementById('configs-grid');
            grid.innerHTML = '';
            
            const configsList = configsText.split('\n').filter(line => line.trim() !== '');
            allConfigsRaw = configsList.join('\n'); // ذخیره برای سابسکریپشن

            if(configsList.length === 0) {
                grid.innerHTML = `<div class="empty-state"><h3>هیچ کانفیگی یافت نشد!</h3></div>`;
                return;
            }

            configsList.forEach(config => {
                const protocol = config.split('://')[0].toLowerCase();
                if(!['vless', 'vmess', 'trojan'].includes(protocol)) return;

                const remark = extractRemark(config, protocol);
                const flag = getFlag(remark);
                const ping = getRandomPing();
                
                // تعیین رنگ پینگ
                let pingColor = 'var(--success)';
                if(ping > 150) pingColor = '#f59e0b'; // نارنجی
                if(ping > 250) pingColor = 'var(--accent-secondary)'; // قرمز

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="badge ${protocol}">${protocol}</span>
                        <span class="flag-icon">${flag}</span>
                    </div>
                    <div class="card-title" title="${remark}">${remark}</div>
                    <div class="card-stats">
                        <div class="ping" style="color: ${pingColor}">
                            <div class="ping-dot" style="background-color: ${pingColor}; box-shadow: 0 0 8px ${pingColor}"></div>
                            ${ping} ms
                        </div>
                        <button class="copy-btn" onclick="copyToClipboard('${config}')" title="کپی کانفیگ">
                            <i class="fa-regular fa-copy"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // دریافت کانفیگ‌ها از فایل
        async function fetchConfigs() {
            try {
                // تلاش برای خواندن فایلی که توسط پایتون ساخته می‌شود
                const response = await fetch('configs.txt');
                if (!response.ok) throw new Error('فایل پیدا نشد');
                const text = await response.text();
                renderConfigs(text);
            } catch (error) {
                console.log("استفاده از دیتای جایگزین (نسخه پیش‌نمایش)");
                renderConfigs(fallbackData.join('\n'));
            }
        }

        // کپی متن
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("کانفیگ کپی شد!");
            });
        }

        // کپی لینک سابسکریپشن
        function copySubscription() {
            // در حالت واقعی، آدرس صفحه گیت‌هاب پیج شما + configs.txt ساب شماست
            const currentUrl = window.location.href.replace('index.html', '');
            const subLink = currentUrl + 'configs.txt';
            
            navigator.clipboard.writeText(subLink).then(() => {
                showToast("لینک سابسکریپشن شما کپی شد!");
            });
        }

        // نمایش پیغام توست
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fa-solid fa-check"></i> ${message}`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // اجرا هنگام لود صفحه
        window.onload = fetchConfigs;
    </script>
</body>
</html>
